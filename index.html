<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSee Dashboard</title>
    <!-- টেলিগ্রামের সাথে কানেক্ট করার স্ক্রিপ্ট -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            background-color: #0b1426; /* ডার্ক ব্যাকগ্রাউন্ড */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .header {
            width: 100%;
            margin-bottom: 25px;
        }
        .balance-card {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .balance-title { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
        .balance-amount { font-size: 36px; font-weight: bold; margin-bottom: 15px; }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .stat-box { text-align: center; font-size: 12px; }
        .stat-value { display: block; font-weight: bold; font-size: 16px; }

        .btn-watch {
            background-color: #f59e0b;
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="user-name">Hello!</h1>
            <p style="opacity: 0.7; margin-top: -10px;">Welcome to your AdSee dashboard.</p>
        </div>

        <div class="balance-card">
            <div class="balance-title">Total Balance</div>
            <div class="balance-amount">$33.630</div>
            
            <div class="stats-row">
                <div class="stat-box"><span class="stat-value">$0.00</span>Withdrawn</div>
                <div class="stat-box"><span class="stat-value">576</span>Ads Watched</div>
                <div class="stat-box"><span class="stat-value">3</span>Referrals</div>
            </div>
        </div>

        <button class="btn-watch">⚡ Watch Pop Up Ad</button>
    </div>

    <script>
        // টেলিগ্রাম অ্যাপ কনফিগারেশন
        const tg = window.Telegram.WebApp;
        tg.expand(); // অ্যাপটি বড় করে ওপেন হবে

        // টেলিগ্রাম থেকে ইউজারের নাম নেওয়া
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = "Hello, " + user.first_name + "!";
        }
    </script>
</body>
</html>
