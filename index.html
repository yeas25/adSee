<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSee Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #0b1426; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        /* Header: Profile beside Name */
        .header-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .profile-btn-top {
            background: #6366f1;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }
        .user-info h2 { margin: 0; font-size: 22px; font-weight: bold; }
        .user-info p { margin: 2px 0 0 0; opacity: 0.6; font-size: 13px; }

        /* Balance Card */
        .balance-card { 
            background: linear-gradient(135deg, #4f46e5, #9333ea); 
            padding: 25px; 
            border-radius: 25px; 
            margin-bottom: 20px; 
        }
        .balance-amount { font-size: 38px; font-weight: bold; margin-top: 5px; }
        
        /* Action Button */
        .btn-watch { 
            background: #f59e0b; 
            color: black; 
            border: none; 
            width: 100%; 
            padding: 18px; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 20px;
        }

        /* Nav Bar */
        .nav-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #111827; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid #1f2937; 
        }
        .nav-item { 
            text-align: center; 
            color: #4b5563; 
            font-size: 11px; 
            flex: 1; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .nav-item.active { color: #6366f1; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .chart-card { background: #161f33; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="header-section">
        <button class="profile-btn-top" onclick="tg.showAlert('প্রোফাইল সেটিংস শীঘ্রই আসছে!')">
            <i class="material-icons">person</i>
        </button>
        <div class="user-info">
            <h2 id="display-name">Yeachin!</h2>
            <p>Let's earn some money today!</p>
        </div>
    </div>

    <div class="balance-card">
        <span style="font-size: 13px; opacity: 0.8;">Total Balance</span>
        <div class="balance-amount">$36.790</div>
    </div>

    <button class="btn-watch" id="watchBtn">
        <i class="material-icons">bolt</i> Watch Pop Up Ad
    </button>

    <div class="chart-card">
        <canvas id="incomeChart" height="150"></canvas>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="tabChange(this, 'Home')">
            <i class="material-icons">home</i>Home
        </div>
        <div class="nav-item" onclick="tabChange(this, 'Tasks')">
            <i class="material-icons">task</i>Tasks
        </div>
        <div class="nav-item" onclick="tabChange(this, 'Refer')">
            <i class="material-icons">people</i>Refer
        </div>
        <div class="nav-item" onclick="tabChange(this, 'Wallet')">
            <i class="material-icons">account_balance_wallet</i>Wallet
        </div>
        <div class="nav-item" onclick="tabChange(this, 'Menu')">
            <i class="material-icons">menu</i>Menu
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function tabChange(el, name) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        document.getElementById('watchBtn').onclick = function() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showAlert("অ্যাড লোড হচ্ছে...");
        };

        const ctx = document.getElementById('incomeChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{
                    data: [0, 1.15, 1.15, 1.20, 1.20, 2.11, 1.05],
                    backgroundColor: '#6366f1',
                    borderRadius: 6
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    </script>
</body>
</html>
