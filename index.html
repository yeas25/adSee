<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSee Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            background-color: #0b1426;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Profile Section Update: Photo on the Left */
        .profile-section {
            display: flex;
            align-items: center; /* Nam ebong photo ke ek-i line-e rakhbe */
            gap: 12px; /* Photo ebong namer majhe faka jayga */
            margin-bottom: 25px;
        }
        .profile-icon {
            background: #6366f1;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .profile-icon i {
            font-size: 28px; /* Icon size ektu boro kora hoyeche */
        }
        .user-info h2 {
            margin: 0;
            font-size: 22px;
        }
        .user-info p {
            margin: 2px 0 0 0;
            opacity: 0.6;
            font-size: 13px;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }
        .balance-amount { font-size: 38px; font-weight: bold; margin: 10px 0; }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-weight: bold; font-size: 16px; }
        .stat-item label { font-size: 11px; opacity: 0.7; }

        .btn-reset {
            background: #1e293b;
            color: #94a3b8;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-watch {
            background: #f59e0b;
            color: black;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .chart-card {
            background: #161f33;
            padding: 20px;
            border-radius: 25px;
            margin-top: 25px;
        }

        /* Bottom Nav */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111827;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #1f2937;
        }
        .nav-item {
            text-align: center;
            color: #4b5563;
            text-decoration: none;
            font-size: 11px;
        }
        .nav-item.active { color: #6366f1; }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="profile-section">
        <div class="profile-icon">
            <i class="material-icons">person</i>
        </div>
        <div class="user-info">
            <h2 id="user-name">Yeachin!</h2>
            <p>Let's earn some money today!</p>
        </div>
    </div>

    <div class="balance-card">
        <label style="font-size: 13px; opacity: 0.8;">Total Balance</label>
        <div class="balance-amount">$36.790</div>
        <div class="stats-row">
            <div class="stat-item"><span>$0.000</span><label>Withdrawn</label></div>
            <div class="stat-item"><span>621</span><label>Ads Watched</label></div>
            <div class="stat-item"><span>3</span><label>Referrals</label></div>
        </div>
    </div>

    <button class="btn-reset">
        <i class="material-icons" style="font-size: 18px;">history_toggle_off</i> Reset in: 14:29:41
    </button>

    <button class="btn-watch" onclick="startAd()">
        <i class="material-icons">bolt</i> Watch Pop Up Ad
    </button>

    <div class="chart-card">
        <p style="margin-top:0; font-weight: bold; font-size: 14px;">Income Stats (7D)</p>
        <canvas id="incomeChart" height="150"></canvas>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="material-icons">home</i>Home</a>
        <a href="#" class="nav-item"><i class="material-icons">task</i>Tasks</a>
        <a href="#" class="nav-item"><i class="material-icons">people</i>Refer</a>
        <a href="#" class="nav-item"><i class="material-icons">account_balance_wallet</i>Wallet</a>
        <a href="#" class="nav-item"><i class="material-icons">person_outline</i>Profile</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Telegram theke real name neyar jonyo
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + "!";
        }

        // Chart Configuration
        const ctx = document.getElementById('incomeChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{
                    data: [0.0, 1.15, 1.15, 1.20, 1.20, 2.11, 1.05],
                    backgroundColor: '#6366f1',
                    borderRadius: 8,
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                }
            }
        });

        function startAd() {
            tg.HapticFeedback.impactOccurred('light');
            tg.showAlert("Ad loading system start kora hocche...");
        }
    </script>
</body>
</html>
