<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSee$ Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b1426; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Header Section */
        .header-section { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .user-info h2 { margin: 0; font-size: 22px; }
        .user-info p { margin: 2px 0; opacity: 0.6; font-size: 13px; }
        .profile-icon { background: #6366f1; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Balance Card */
        .balance-card { background: linear-gradient(135deg, #4f46e5, #9333ea); padding: 25px; border-radius: 25px; margin-bottom: 20px; }
        .balance-amount { font-size: 38px; font-weight: bold; }
        .stats-grid { display: flex; justify-content: space-between; margin-top: 15px; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }

        /* Buttons */
        .btn-watch { background: #f59e0b; color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1f2937; z-index: 100; }
        .nav-item { text-align: center; color: #4b5563; font-size: 11px; flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: #6366f1; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        /* Withdrawal Overlay */
        #withdraw-overlay { position: fixed; top: 100%; left: 0; width: 100%; height: 85%; background: #0e121e; border-radius: 30px 30px 0 0; z-index: 1000; padding: 25px; transition: top 0.4s ease; box-sizing: border-box; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        #withdraw-overlay.open { top: 15%; }
        .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .method-box { background: #161f33; padding: 15px; border-radius: 12px; text-align: center; font-size: 11px; border: 1px solid #1f2937; cursor: pointer; }
        .method-box.selected { border-color: #6366f1; background: rgba(99,102,241,0.1); }
        .form-input { width: 100%; padding: 15px; background: #161f33; border: 1px solid #1f2937; border-radius: 12px; color: white; margin: 10px 0 20px 0; box-sizing: border-box; }
        .btn-withdraw-now { background: #16a34a; color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="user-info">
            <h2>Hello, Yeachin!</h2>
            <p>Let's earn some money today!</p>
        </div>
        <div class="profile-icon"><i class="material-icons">person</i></div>
    </div>

    <div class="balance-card">
        <span style="font-size: 13px; opacity: 0.8;">Total Balance</span>
        <div class="balance-amount">$36.790</div>
        <div class="stats-grid">
            <div><strong>$0.000</strong><br><span style="opacity:0.6">Withdrawn</span></div>
            <div><strong>621</strong><br><span style="opacity:0.6">Ads Watched</span></div>
            <div><strong>3</strong><br><span style="opacity:0.6">Referrals</span></div>
        </div>
    </div>

    <button class="btn-watch" onclick="tg.showAlert('অ্যাড লোড হচ্ছে...')">
        <i class="material-icons">bolt</i> Watch Pop Up Ad
    </button>

    <div style="background: #161f33; padding: 20px; border-radius: 20px;">
        <p style="margin:0 0 15px 0; font-size: 14px; font-weight: bold;">Income Stats (7D)</p>
        <canvas id="incomeChart" height="150"></canvas>
    </div>

    <div id="withdraw-overlay">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">Withdrawal</h2>
            <i class="material-icons" onclick="toggleWithdraw()" style="cursor:pointer">close</i>
        </div>
        <div class="method-grid">
            <div class="method-box" onclick="selectMe(this)">bKash</div>
            <div class="method-box" onclick="selectMe(this)">Binance</div>
            <div class="method-box" onclick="selectMe(this)">USDT</div>
            <div class="method-box" onclick="selectMe(this)">Litecoin</div>
            <div class="method-box" onclick="selectMe(this)">Webmoney</div>
            <div class="method-box" onclick="selectMe(this)">M-PESA</div>
        </div>
        <label style="font-size: 12px; color: #a0a0a0;">Method Details</label>
        <input type="text" class="form-input" placeholder="Enter account details">
        <button class="btn-withdraw-now" onclick="tg.showAlert('Request Submitted!')">Withdraw Now</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active"><i class="material-icons">home</i>Home</div>
        <div class="nav-item"><i class="material-icons">task</i>Tasks</div>
        <div class="nav-item"><i class="material-icons">people</i>Refer</div>
        <div class="nav-item" onclick="toggleWithdraw()"><i class="material-icons">account_balance_wallet</i>Wallet</div>
        <div class="nav-item" onclick="toggleWithdraw()"><i class="material-icons">menu</i>Menu</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function toggleWithdraw() {
            document.getElementById('withdraw-overlay').classList.toggle('open');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function selectMe(el) {
            document.querySelectorAll('.method-box').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            tg.HapticFeedback.selectionChanged();
        }

        const ctx = document.getElementById('incomeChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{ data: [0, 1.15, 1.15, 1.20, 1.20, 2.11, 1.05], backgroundColor: '#6366f1', borderRadius: 6 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
        });
    </script>
</body>
</html>
