<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finovaa Clone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            background-color: #0b1426;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* প্রোফাইল হেডার */
        .profile-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .profile-icon {
            background: #6366f1;
            padding: 10px;
            border-radius: 50%;
            display: flex;
        }

        /* ব্যালেন্স কার্ড */
        .balance-card {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            padding: 25px;
            border-radius: 30px;
            text-align: left;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .balance-card::after {
            content: '';
            position: absolute;
            right: -20px;
            top: -20px;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .balance-amount { font-size: 38px; font-weight: bold; margin: 10px 0; }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-weight: bold; font-size: 16px; }
        .stat-item label { font-size: 11px; opacity: 0.7; }

        /* বাটন স্টাইল */
        .btn-reset {
            background: #252d4a;
            color: #94a3b8;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-watch {
            background: #f59e0b;
            color: black;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        /* চার্ট কার্ড */
        .chart-card {
            background: #161f33;
            padding: 20px;
            border-radius: 25px;
            margin-top: 25px;
        }

        /* বটম নেভিগেশন */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111827;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #1f2937;
        }
        .nav-item {
            text-align: center;
            color: #4b5563;
            text-decoration: none;
            font-size: 12px;
        }
        .nav-item.active { color: #6366f1; }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-section">
        <div>
            <h2 id="name" style="margin:0">Hello, Yeachin!</h2>
            <p style="margin:5px 0; opacity: 0.6; font-size: 14px;">Let's earn some money today!</p>
        </div>
        <div class="profile-icon">
            <i class="material-icons">person</i>
        </div>
    </div>

    <div class="balance-card">
        <label style="font-size: 13px; opacity: 0.8;">Total Balance</label>
        <div class="balance-amount">$36.790</div>
        <div class="stats-row">
            <div class="stat-item"><span>$0.000</span><label>Withdrawn</label></div>
            <div class="stat-item"><span>621</span><label>Ads Watched</label></div>
            <div class="stat-item"><span>3</span><label>Referrals</label></div>
        </div>
    </div>

    <button class="btn-reset">
        <i class="material-icons" style="font-size: 18px;">play_arrow</i> Reset in: 14:29:41
    </button>

    <button class="btn-watch" onclick="startAd()">
        <i class="material-icons">bolt</i> Watch Pop Up Ad
    </button>

    <div class="chart-card">
        <p style="margin-top:0; font-weight: bold;">Income Stats (7D)</p>
        <canvas id="incomeChart" height="150"></canvas>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="material-icons">home</i>Home</a>
        <a href="#" class="nav-item"><i class="material-icons">list_alt</i>Tasks</a>
        <a href="#" class="nav-item"><i class="material-icons">groups</i>Refer</a>
        <a href="#" class="nav-item"><i class="material-icons">account_balance_wallet</i>Wallet</a>
        <a href="#" class="nav-item"><i class="material-icons">person_outline</i>Profile</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // গ্রাফ তৈরি করার কোড
        const ctx = document.getElementById('incomeChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{
                    label: 'Income',
                    data: [0.0, 1.15, 1.15, 1.20, 1.20, 2.11, 1.05],
                    backgroundColor: '#6366f1',
                    borderRadius: 8,
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });

        function startAd() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showAlert("বিজ্ঞাপন সিস্টেমটি প্রসেস করা হচ্ছে...");
        }
    </script>
</body>
</html>
