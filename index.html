<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Coin - Withdrawal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* General Styles */
        body { background-color: #0b1426; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .page-container { padding: 20px; padding-bottom: 100px; transition: 0.3s; }

        /* Top Header */
        .top-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding: 20px; }
        .profile-btn-top { background: #6366f1; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .user-info h2 { margin: 0; font-size: 22px; font-weight: bold; }
        .user-info p { margin: 2px 0 0 0; opacity: 0.6; font-size: 13px; }

        /* Balance Card */
        .balance-card { background: linear-gradient(135deg, #4f46e5, #9333ea); padding: 25px; border-radius: 25px; margin: 0 20px 20px 20px; }
        .balance-amount { font-size: 38px; font-weight: bold; margin-top: 5px; }

        /* Withdraw Trigger Button on Home Page */
        .withdraw-trigger-btn {
            background-color: #f59e0b; color: black; border: none; width: calc(100% - 40px);
            padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold;
            margin: 0 20px 20px 20px; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer;
        }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1f2937; z-index: 100; }
        .nav-item { text-align: center; color: #4b5563; font-size: 11px; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #6366f1; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        /* PAYMENT PAGE OVERLAY (Sliding Panel) */
        #payment-overlay {
            position: fixed; top: 100%; left: 0; width: 100%; height: calc(100% - 80px); /* adjusted height */
            background-color: #0e121e; border-top-left-radius: 25px; border-top-right-radius: 25px;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.5); z-index: 1000;
            overflow-y: auto; transition: top 0.4s ease-out;
            padding: 20px;
        }
        #payment-overlay.open { top: 80px; } /* Target height from top */

        /* Payment Content Styles */
        .payment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .close-btn { background: none; border: none; color: #a0a0a0; font-size: 24px; cursor: pointer; padding: 5px; }
        .close-btn:hover { color: white; }

        .payment-methods-card { background: #161f33; padding: 25px; border-radius: 25px; margin-bottom: 20px; }
        .payment-methods-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .method-box {
            background-color: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px;
            text-align: center; color: #a0a0a0; font-size: 11px; border: 2px solid transparent; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; transition: 0.2s;
        }
        .method-box.selected { border-color: #6366f1; color: white; }
        .method-box:hover { background-color: rgba(255, 255, 255, 0.1); }
        .method-box img { width: 30px; height: 30px; margin-bottom: 8px; object-fit: contain; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #a0a0a0; margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-size: 14px; box-sizing: border-box;
        }
        .form-input::placeholder { color: #505050; }

        .btn-withdraw-final {
            width: 100%; padding: 18px; background: #16a34a; /* Green */
            border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold;
            display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer;
            margin-top: 25px; transition: 0.2s;
        }
        .btn-withdraw-final:active { transform: scale(0.98); }

        .history-title { margin-top: 30px; font-size: 18px; font-weight: bold; }
        
        /* Backdrop to obscure home page when payment is open */
        #page-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999; display: none;
            transition: 0.3s;
        }
        #page-backdrop.open { display: block; }
    </style>
</head>
<body>

    <div id="page-backdrop"></div>

    <div class="page-container">
        <div class="header-section">
            <div class="top-header">
                <button class="profile-btn-top">
                    <i class="material-icons">person</i>
                </button>
                <div class="user-info">
                    <h2>Hello, Yeachin!</h2>
                    <p>Let's earn some money today!</p>
                </div>
            </div>
        </div>

        <div class="balance-card">
            <span style="font-size: 13px; opacity: 0.8;">Total Balance</span>
            <div class="balance-amount">$33.630</div>
        </div>

        <button class="withdraw-trigger-btn" onclick="openWithdrawal()">
            <i class="material-icons">account_balance_wallet</i> Withdraw Now
        </button>

        <div style="background: #161f33; padding: 20px; border-radius: 20px; margin: 0 20px;">
            <canvas id="incomeChart" height="150"></canvas>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active"><i class="material-icons">home</i>Home</div>
            <div class="nav-item"><i class="material-icons">task</i>Tasks</div>
            <div class="nav-item"><i class="material-icons">people</i>Refer</div>
            <div class="nav-item"><i class="material-icons">account_balance_wallet</i>Wallet</div>
            <div class="nav-item"><i class="material-icons">menu</i>Menu</div>
        </nav>
    </div>

    <div id="payment-overlay">
        <div class="payment-header">
            <h2 style="margin: 0; font-size: 22px;">Withdrawal</h2>
            <button class="close-btn" onclick="closeWithdrawal()"><i class="material-icons">close</i></button>
        </div>

        <div class="payment-methods-card">
            <label style="display: block; font-size: 13px; color: #a0a0a0; margin-bottom: 15px;">Select Payment Method</label>
            <div class="payment-methods-grid">
                <div class="method-box" onclick="selectMethod(this, 'bKash')">
                    <img src="https://yeas25.github.io/adSee/bkash_icon.png" alt="bKash" onerror="this.src='https://icons.iconarchive.com/icons/google/noto-emoji-symbols/32/73114-bird-icon.png'">
                    bKash
                </div>
                <div class="method-box" onclick="selectMethod(this, 'Binance')">
                    <img src="https://yeas25.github.io/adSee/binance_icon.png" alt="Binance" onerror="this.src='https://s2.coinmarketcap.com/static/img/exchanges/64x64/270.png'">
                    Binance
                </div>
                <div class="method-box" onclick="selectMethod(this, 'USDT')">
                    <img src="https://yeas25.github.io/adSee/usdt_icon.png" alt="USDT" onerror="this.src='https://cryptologos.cc/logos/tether-usdt-logo.png?v=026'">
                    USDT
                </div>
                <div class="method-box" onclick="selectMethod(this, 'Litecoin')">
                    <img src="https://yeas25.github.io/adSee/litecoin_icon.png" alt="Litecoin" onerror="this.src='https://cryptologos.cc/logos/litecoin-ltc-logo.png?v=026'">
                    Litecoin
                </div>
                <div class="method-box" onclick="selectMethod(this, 'Webmoney')">
                    <img src="https://yeas25.github.io/adSee/webmoney_icon.png" alt="Webmoney" onerror="this.src='https://logos-world.net/wp-content/uploads/2021/04/WebMoney-Logo.png'">
                    Webmoney
                </div>
                <div class="method-box" onclick="selectMethod(this, 'M-PESA')">
                    <img src="https://yeas25.github.io/adSee/mpesa_icon.png" alt="M-PESA" onerror="this.src='https://www.safaricom.co.ke/media-center-media/m-pesa_logo_814x622.png'">
                    M-PESA
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Method Details</label>
            <input type="text" class="form-input" placeholder="---" id="method-details">
        </div>
        <div class="form-group">
            <label>Points to Withdraw (Min 5000)</label>
            <input type="number" class="form-input" placeholder="5000" id="points-amount">
        </div>

        <button class="btn-withdraw-final" onclick="submitWithdraw()">
            <i class="material-icons">check_circle</i> Withdraw Now
        </button>

        <h3 class="history-title">Transaction History</h3>
        <p style="opacity: 0.6; font-size: 13px;">No withdrawal history yet.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ১. পেমেন্ট পেজ ওপেন/ক্লোজ করার লজিক
        const overlay = document.getElementById('payment-overlay');
        const backdrop = document.getElementById('page-backdrop');

        function openWithdrawal() {
            tg.HapticFeedback.impactOccurred('medium');
            overlay.classList.add('open');
            backdrop.classList.add('open');
            // ব্যাক বাটন সেট করা
            tg.BackButton.show();
            tg.BackButton.onClick(closeWithdrawal);
        }

        function closeWithdrawal() {
            tg.HapticFeedback.impactOccurred('light');
            overlay.classList.remove('open');
            backdrop.classList.remove('open');
            tg.BackButton.hide();
        }

        // ২. পেমেন্ট মেথড সিলেক্ট করার লজিক
        let selectedPaymentMethod = null;
        function selectMethod(element, methodName) {
            // আগের সিলেকশন বাদ দেওয়া
            document.querySelectorAll('.method-box').forEach(box => {
                box.classList.remove('selected');
            });
            // নতুনটি সিলেক্ট করা
            element.classList.add('selected');
            selectedPaymentMethod = methodName;
            
            // ভাইব্রেশন ও মেসেজ
            tg.HapticFeedback.selectionChanged();
            tg.showAlert(methodName + " সিলেক্ট করা হয়েছে।");
            
            // ফর্মের প্লেসহোল্ডার পরিবর্তন (ঐচ্ছিক)
            const input = document.getElementById('method-details');
            if(methodName === 'bKash') input.placeholder = "Enter bKash Number";
            else if(methodName === 'Binance') input.placeholder = "Enter Binance Pay ID";
            else input.placeholder = "Enter Wallet Address";
        }

        // ৩. ফাইনাল উইথড্র সাবমিট লজিক
        function submitWithdraw() {
            const points = document.getElementById('points-amount').value;
            const details = document.getElementById('method-details').value;

            if (!selectedPaymentMethod) {
                tg.showAlert("অনুগ্রহ করে একটি পেমেন্ট মেথড সিলেক্ট করুন।");
                return;
            }
            if (!details) {
                tg.showAlert(selectedPaymentMethod + "-এর ডিটেইলস দিন।");
                return;
            }
            if (points < 5000) {
                tg.showAlert("উইথড্র করার জন্য নূন্যতম ৫০০০ পয়েন্ট লাগবে।");
                return;
            }

            // হ্যাপটিক ফিডব্যাক ও কনফার্মেশন
            tg.HapticFeedback.notificationOccurred('success');
            tg.showConfirm(points + " পয়েন্ট " + selectedPaymentMethod + "-এ উইথড্র করার রিকোয়েস্ট পাঠানো হবে। আপনি কি নিশ্চিত?", (ok) => {
                if(ok) {
                    tg.showAlert("রিকোয়েস্টটি প্রসেস করা হচ্ছে। অনুগ্রহ করে ২-৩ ঘন্টা অপেক্ষা করুন।");
                    closeWithdrawal();
                }
            });
        }

        // ৪. চার্ট সেটআপ (আগের মতোই থাকবে)
        const ctx = document.getElementById('incomeChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{
                    data: [0, 1.15, 1.15, 1.20, 1.20, 2.11, 1.05],
                    backgroundColor: '#6366f1',
                    borderRadius: 6
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    </script>
</body>
</html>
